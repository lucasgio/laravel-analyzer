name: CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: xdebug
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite=Unit --no-coverage

      - name: Run integration tests
        run: vendor/bin/phpunit --testsuite=Integration --no-coverage

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: xdebug
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Create coverage directory
        run: mkdir -p build/coverage

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-clover=build/coverage/clover.xml
        env:
          XDEBUG_MODE: coverage

      - name: Enforce minimum 80% coverage
        run: |
          php -r "
            \$xml = simplexml_load_file('build/coverage/clover.xml');
            \$statements = (int)\$xml->project->metrics['statements'];
            \$covered = (int)\$xml->project->metrics['coveredstatements'];
            \$pct = \$statements > 0 ? (\$covered / \$statements) * 100 : 0;
            echo 'Coverage: ' . round(\$pct, 2) . '%' . PHP_EOL;
            echo 'Statements: ' . \$statements . ', Covered: ' . \$covered . PHP_EOL;
            if (\$pct < 80) {
              echo 'FAIL: Coverage ' . round(\$pct, 2) . '% is below the required 80% minimum.' . PHP_EOL;
              exit(1);
            }
            echo 'PASS: Coverage meets the 80% minimum threshold.' . PHP_EOL;
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/coverage/
          retention-days: 7
