name: Release & Publish

on:
  push:
    branches: [ main ]

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Prevent infinite loop: skip if this push is itself a version bump commit
      - name: Check if release bump commit
        id: guard
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$COMMIT_MSG" | grep -qE "^chore\(release\):"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping — this is a release bump commit."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------------
      # Calculate next semantic version from Conventional Commits
      #
      # Rules (in priority order):
      #   BREAKING CHANGE in body  OR  type(scope)!: in subject  →  MAJOR
      #   feat: / feat(scope):                                    →  MINOR
      #   anything else (fix, chore, docs, perf, refactor …)     →  PATCH
      # ------------------------------------------------------------------
      - name: Calculate next semantic version
        if: steps.guard.outputs.skip == 'false'
        id: semver
        run: |
          # Get the latest semver tag; fall back to v0.0.0 on a fresh repo
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | sort -V | tail -n1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "Latest tag: $LATEST_TAG"

          CURRENT_VERSION=${LATEST_TAG#v}

          # Collect commit subjects and bodies since the last tag
          SUBJECTS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s")
          BODIES=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s%n%b")

          if [ -z "$SUBJECTS" ]; then
            echo "No new commits since $LATEST_TAG — nothing to release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$SUBJECTS"

          # Determine bump type
          BUMP="patch"

          if echo "$BODIES" | grep -qE "BREAKING CHANGE" \
          || echo "$SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:"; then
            BUMP="major"
          elif echo "$SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          fi

          echo "Bump type: $BUMP"

          # Increment version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: ${NEW_VERSION}"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update version in Application.php
        if: steps.guard.outputs.skip == 'false' && steps.semver.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.semver.outputs.new_version }}
        run: |
          sed -i "s/VERSION = '[0-9]*\.[0-9]*\.[0-9]*'/VERSION = '${NEW_VERSION}'/" \
            src/Console/Application.php
          echo "Application.php updated:"
          grep "VERSION" src/Console/Application.php

      - name: Commit version bump
        if: steps.guard.outputs.skip == 'false' && steps.semver.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.semver.outputs.new_version }}
          BUMP: ${{ steps.semver.outputs.bump }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/Console/Application.php
          git commit -m "chore(release): bump version to ${NEW_VERSION} [${BUMP}]"
          git push origin main

      - name: Create and push tag
        if: steps.guard.outputs.skip == 'false' && steps.semver.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.semver.outputs.new_version }}
        run: |
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false' && steps.semver.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semver.outputs.new_version }}
          name: Release v${{ steps.semver.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-packagist:
    name: Update Packagist
    runs-on: ubuntu-latest
    needs: release
    if: always() && needs.release.result != 'cancelled'

    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"${REPO_URL}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            || echo "Packagist webhook failed (package may not be registered yet)"
